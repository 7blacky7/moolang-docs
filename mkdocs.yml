  - Sprache & Stdlib:
      - Kern-Builtins: referenz/kern.md
      - Mathematik: referenz/mathematik.md
      - Text (Strings): referenz/strings.md
      - Listen: referenz/listen.md
      - Dicts: referenz/dicts.md
      - Fehlerbehandlung: referenz/fehler.md
      - Result-Typ: referenz/result.md
      - Events & Freeze: referenz/events.md
      - Stdlib-Module: referenz/stdlib.md
      - JSON: referenz/json.md
      - HTTP: referenz/http.md
      - Dateien & Verzeichnisse: referenz/dateien.md
      - Datenbank: referenz/datenbank.md
      - Kryptografie: referenz/krypto.md
      - Regex: referenz/regex.md
      - Threads: referenz/threads.md
      - Channels: referenz/channels.md
      - Netzwerk (TCP/UDP): referenz/netzwerk.md
      - Webserver: referenz/webserver.md
      - Profiler: referenz/profiler.md
