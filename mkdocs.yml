site_name: moolang — Dokumentation
site_description: Programmiersprache auf Deutsch mit nativer LLVM-Kompilierung
site_url: https://7blacky7.github.io/moolang-docs/
repo_url: https://github.com/7blacky7/moo
repo_name: 7blacky7/moo
edit_uri: edit/master/docs/

theme:
  name: material
  language: de
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Dunkelmodus
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Hellmodus
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang: de

extra:
  status:
    alpha: Alpha — Name und Dateiendung sind nicht final
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/7blacky7
  generator: false

copyright: Open Source — Lizenz wird vor v1.0 festgelegt

nav:
  - Start: index.md
  - Installation: installation.md
  - Features: features.md
  - Tutorial: tutorial.md
  - Sprache:
      - sprache/grundlagen.md
  - Runtime-APIs:
      - 2D-Grafik & Sprites: runtime/grafik.md
      - 3D-Grafik: runtime/3d.md
      - JSON: runtime/json.md
      - HTTP & Netzwerk: runtime/http.md
      - Datenbank: runtime/datenbank.md
      - Kryptografie: runtime/krypto.md
      - Threads & Channels: runtime/threads.md
  - Beispiele: beispiele.md
  - Editor (VS Code): editor.md
